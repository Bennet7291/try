<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClassiCube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1a1a1a; overflow: hidden; }
    #canvas_wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: #ccc;
      font-family: sans-serif;
      gap: 16px;
      z-index: 10;
    }
    #loading h1 { font-size: 2em; color: #fff; }
    #progress-bar {
      width: 300px; height: 8px;
      background: #333; border-radius: 4px; overflow: hidden;
    }
    #progress-fill {
      height: 100%; width: 0%;
      background: #4a9eff;
      transition: width 0.2s;
    }
    #status { font-size: 0.9em; color: #888; }
  </style>
</head>
<body>
  <div id="loading">
    <h1>ClassiCube</h1>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="status">Loading…</div>
  </div>
  <div id="canvas_wrapper">
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  </div>
  <script>
    var Module = {
      canvas: (function() { return document.getElementById('canvas'); })(),
      setStatus: function(text) {
        var m = text.match(/(\d+(\.\d+)?)\/(\d+)/);
        if (m) {
          var pct = (parseInt(m[1]) / parseInt(m[3])) * 100;
          document.getElementById('progress-fill').style.width = pct + '%';
          document.getElementById('status').textContent = 'Loading… ' + Math.round(pct) + '%';
        } else if (text === '') {
          document.getElementById('loading').style.display = 'none';
        } else {
          document.getElementById('status').textContent = text;
        }
      },
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
      },
      onRuntimeInitialized: function() {
        document.getElementById('loading').style.display = 'none';
      }
    };
    window.onerror = function(msg) {
      document.getElementById('status').textContent = 'Error: ' + msg;
    };
  </script>
  <script src="ClassiCube.js"></script>
</body>
</html>
